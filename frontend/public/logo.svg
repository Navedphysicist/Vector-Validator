<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Background circle -->
  <rect width="40" height="40" rx="10" fill="#2563EB"/>
  <!-- V shape made of three converging lines representing vectors -->
  <path d="M10 12 L20 28 L30 12" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Three dots at the vector origins + convergence point -->
  <circle cx="10" cy="12" r="2.5" fill="white"/>
  <circle cx="30" cy="12" r="2.5" fill="white"/>
  <circle cx="20" cy="28" r="2.5" fill="#93C5FD"/>
  <!-- Horizontal priority lines on the right -->
  <line x1="24" y1="14" x2="32" y2="14" stroke="#93C5FD" stroke-width="2" stroke-linecap="round"/>
  <line x1="26" y1="19" x2="32" y2="19" stroke="#93C5FD" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="28" y1="24" x2="32" y2="24" stroke="#93C5FD" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
</svg>
